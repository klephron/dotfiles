source = $XDG_CONFIG_HOME/hypr/themes/gruber-darker.conf

debug {
  disable_logs = false # hide red error
  suppress_errors = true
}

ecosystem {
  no_update_news = true
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  vfr = true
}

xwayland {
  force_zero_scaling = true
}

general {
  gaps_in = 0
  gaps_out = 0
  layout = hy3
  col.active_border = $border_active
  col.border        = $border
}

animations {
  enabled = false
}

decoration {
  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

input {
  kb_layout = us,ru
  kb_options = grp:alt_shift_toggle, altwin:menu_win

  follow_mouse = 1

  accel_profile = flat
  sensitivity = 0

  # repeat_delay = 150
  repeat_delay = 180
  repeat_rate = 45
}

plugin {
  split-monitor-workspaces {
    count = 12
    keep_focused = 0
    enable_notifications = 0
    enable_persistent_workspaces = 1
  }
  hy3 {
    tab_first_window = true
    group_inset = 0
    tabs {
      height = 20
      radius = 0
      border_width = 0
      padding = 0
      text_height = 9
      blur = false
      render_text = true
      colors {
        active                    = $background_active
        active_border             = $border_active
        active_text               = $foreground_active

        active_alt_monitor        = $background_focused
        active_alt_monitor_border = $border_focused
        active_alt_monitor_text   = $foreground_focused

        focused                   = $background_focused
        focused_border            = $border_focus
        focused_text              = $foreground_focused

        inactive                  = $background
        inactive_border           = $border
        inactive_text             = $foreground

        urgent                    = $background_urgent
        urgent_border             = $border_urgent
        urgent_text               = $foreground_urgent
      }
    }
  }
}

source = $XDG_CONFIG_HOME/hypr/hyprland_hardware.conf

source = $XDG_CONFIG_HOME/hypr/hyprland_exec.conf

source = $XDG_CONFIG_HOME/hypr/hyprland_bind.conf

source = $XDG_CONFIG_HOME/hypr/hyprland_windowrule.conf
